theme = "ayu_dark"

[editor]
scrolloff = 10
line-number = "relative"
cursorline = true
bufferline = "multiple"
color-modes = true
trim-final-newlines = true
trim-trailing-whitespace = true
popup-border = "all"
end-of-line-diagnostics = "hint"
clipboard-provider = "wayland"

[editor.statusline]
left = ["mode", "spinner"]
center = ["file-name", "file-modification-indicator"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true
character = "╎"
skip-levels = 1

[editor.soft-wrap]
enable = true

[editor.inline-diagnostics]
cursor-line = "warning"
other-lines = "warning"
